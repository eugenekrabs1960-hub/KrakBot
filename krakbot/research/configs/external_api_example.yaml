dataset:
  source: external_api
  market: SOL/USD
  timeframe: 1m
  min_rows: 10
  external_api:
    provider: kraken
    pair: SOLUSD
    since: null
    limit: 720
features:
  return_periods: [1, 2]
  volatility_window: 3
  momentum_window: 2
  rsi_window: 3
  volume_change_window: 1
  label_horizon: 1
  dropna: true
split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
model:
  type: logistic_regression
  class_weight: balanced
  C: 1.0
  max_iter: 1000
  random_state: 42
artifacts:
  dataset_path: data/solusd_candles.parquet
  featured_path: data/solusd_features.parquet
  model_path: data/baseline_model.joblib
  metadata_path: data/training_metadata.json
  predictions_path: data/test_predictions.parquet
  reports_dir: reports
