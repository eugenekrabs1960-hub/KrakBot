dataset:
  source: local_db
  market: SOL/USD
  timeframe: 1m
  start_ts: null
  end_ts: null
  use_market_trades: true
  min_rows: 5000

features:
  return_periods: [1, 2, 5]
  volatility_window: 20
  momentum_window: 5
  rsi_window: 14
  volume_change_window: 1
  label_horizon: 3
  label_neutral_band_bps: 2
  neutral_handling: drop
  dropna: true

split:
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

walk_forward:
  enabled: true
  n_folds: 5
  min_train_ratio: 0.5

model:
  type: logistic_regression
  class_weight: balanced
  C: 1.0
  max_iter: 1000
  random_state: 42

artifacts:
  dataset_path: data/solusd_candles.parquet
  featured_path: data/solusd_features.parquet
  model_path: data/baseline_model.joblib
  metadata_path: data/training_metadata.json
  predictions_path: data/test_predictions.parquet
  reports_dir: reports
