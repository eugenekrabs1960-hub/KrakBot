services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: krakbot
      POSTGRES_PASSWORD: krakbot
      POSTGRES_DB: krakbot
    ports:
      - '5433:5432'

  redis:
    image: redis:7
    ports:
      - '6380:6379'

  backend:
    image: python:3.11-slim
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg://krakbot:krakbot@postgres:5432/krakbot
      LIVE_PAPER_TEST_MODE_ENABLED: ${LIVE_PAPER_TEST_MODE_ENABLED:-false}
      LIVE_PAPER_TEST_MARKET: ${LIVE_PAPER_TEST_MARKET:-SOL/USD}
      LIVE_PAPER_TEST_LOOP_INTERVAL_SEC: ${LIVE_PAPER_TEST_LOOP_INTERVAL_SEC:-5}
      LIVE_PAPER_TEST_ORDER_QTY: ${LIVE_PAPER_TEST_ORDER_QTY:-0.05}
      LIVE_PAPER_TEST_MAX_ORDERS_PER_MINUTE: ${LIVE_PAPER_TEST_MAX_ORDERS_PER_MINUTE:-6}
      LIVE_PAPER_TEST_MIN_SECONDS_BETWEEN_ORDERS: ${LIVE_PAPER_TEST_MIN_SECONDS_BETWEEN_ORDERS:-5}
      LIVE_PAPER_TEST_FORCE_PAPER_ONLY: ${LIVE_PAPER_TEST_FORCE_PAPER_ONLY:-true}
      JASON_LOOP_ENABLED: ${JASON_LOOP_ENABLED:-false}
      JASON_LOOP_INTERVAL_SEC: ${JASON_LOOP_INTERVAL_SEC:-60}
      JASON_AGENT_MODEL: ${JASON_AGENT_MODEL:-gpt-5.4}
      QWEN_LOCAL_API_KEY: ${QWEN_LOCAL_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      EXTERNAL_API_ENABLED: ${EXTERNAL_API_ENABLED:-true}
      AUTO_LOOPS_ENABLED: ${AUTO_LOOPS_ENABLED:-true}
      AUTONOMY_RUN_STALE_TIMEOUT_SEC: ${AUTONOMY_RUN_STALE_TIMEOUT_SEC:-60}
      AUTONOMY_AUTO_APPLY_ENABLED: ${AUTONOMY_AUTO_APPLY_ENABLED:-true}
      AUTONOMY_AUTO_APPLY_INTERVAL_SEC: ${AUTONOMY_AUTO_APPLY_INTERVAL_SEC:-120}
      AUTONOMY_AUTO_APPLY_MAX_PER_TICK: ${AUTONOMY_AUTO_APPLY_MAX_PER_TICK:-1}
      AUTONOMY_ROLLBACK_ENABLED: ${AUTONOMY_ROLLBACK_ENABLED:-true}
      AUTONOMY_ROLLBACK_INTERVAL_SEC: ${AUTONOMY_ROLLBACK_INTERVAL_SEC:-180}
      HYPERLIQUID_MARKET_COLLECTOR_ENABLED: ${HYPERLIQUID_MARKET_COLLECTOR_ENABLED:-false}
      HYPERLIQUID_MARKET_COLLECTOR_INTERVAL_SEC: ${HYPERLIQUID_MARKET_COLLECTOR_INTERVAL_SEC:-60}
      HYPERLIQUID_MARKET_COLLECTOR_SYMBOLS_LIMIT: ${HYPERLIQUID_MARKET_COLLECTOR_SYMBOLS_LIMIT:-400}
    volumes:
      - ../backend:/app
    command: bash -lc "pip install -r requirements.txt && python -m app.db.migrate && uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload"
    ports:
      - '8010:8010'
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:20
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://backend:8010
    volumes:
      - ../frontend:/app
    command: bash -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    depends_on:
      - backend


  watchdog:
    image: alpine:3.20
    working_dir: /watchdog
    command: sh -lc "apk add --no-cache curl docker-cli >/dev/null && /watchdog/backend_watchdog.sh"
    environment:
      WATCHDOG_TARGET_URL: http://backend:8010
      WATCHDOG_BACKEND_CONTAINER: deploy-backend-1
      WATCHDOG_INTERVAL_SEC: 20
      WATCHDOG_FAILS_BEFORE_RESTART: 2
      WATCHDOG_RESTART_COOLDOWN_SEC: 20
    volumes:
      - ./backend_watchdog.sh:/watchdog/backend_watchdog.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - backend
    restart: unless-stopped
